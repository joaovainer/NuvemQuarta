services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mural-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mural
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "*"
      CACHE_TTL_SECONDS: "10"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mural-worker
    command: ["sh", "-c", "uvicorn app.worker_service:app --host 0.0.0.0 --port $${PORT:-8001}"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mural
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "10"
      PORT: "8001"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: mural-postgres
    environment:
      POSTGRES_DB: mural
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mural"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mural-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
