services:
  - type: web
    name: mural-distribuido-api
    runtime: docker
    plan: free
    region: virginia
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mural-distribuido-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mural-distribuido-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: CACHE_TTL_SECONDS
        value: "10"
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: mural-distribuido-worker
    runtime: docker
    plan: free
    region: virginia
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    dockerCommand: sh -c "uvicorn app.worker_service:app --host 0.0.0.0 --port ${PORT:-8000}"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mural-distribuido-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mural-distribuido-redis
          property: connectionString
      - key: CACHE_TTL_SECONDS
        value: "10"
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: keyvalue
    name: mural-distribuido-redis
    plan: free
    region: virginia
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: mural-distribuido-db
    plan: free
    region: virginia
    databaseName: mural
    user: mural
    ipAllowList: []
